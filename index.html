<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Telemetry Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- <script src="https://cdn.jsdelivr.net/npm/date-fns@2"></script> -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <!-- Tailwind CSS CDN -->
  <!-- <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.3/dist/tailwind.min.css" rel="stylesheet"> -->
  <link rel="stylesheet" href="css/custom.css">
  <script src="js/fortecho.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="pt-8">
  <nav class="fixed top-0 w-full bg-white shadow z-50">
    <div class="navbar-container px-4 sm:px-6 lg:px-8 ">
      <div class="flex items-center justify-between h-8">

        <!-- Logo / Title -->
        <div class="text-lg font-semibold text-gray-800">
          Telemetry Dashboard
        </div>

        <!-- Desktop menu -->
        <ul class="hidden md:flex items-center gap-6 list-none p-0 m-0">
          <li>
            <a href="/" class="nav-link text-sm leading-[14px] text-gray-700 hover:text-teal-600 font-medium">Home</a>
          </li>
          <li>
            <a href="#" class="nav-link text-sm leading-[14px] text-gray-700 hover:text-teal-600 font-medium">Where is Telemetry?</a>
          </li>
          <li>
            <a href="#" class="nav-link text-sm leading-[14px] text-gray-700 hover:text-teal-600 font-medium">Español</a>
          </li>
        </ul>

        <!-- Mobile button -->
        <button id="menuBtn"
          class="md:hidden inline-flex items-center justify-center p-2 rounded-md text-gray-700 hover:text-teal-600 hover:bg-gray-100 focus:outline-none"
          aria-label="Open menu">
          <!-- Icon -->
          <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>

      </div>

      <!-- Mobile menu -->
      <!-- Mobile menu popup from right -->
      <div id="mobileMenu" class="fixed top-10 right-0 h-[calc(100vh-40px)] w-full bg-white shadow-lg transform translate-x-full transition-transform duration-300 ease-in-out z-50">
        <ul class="flex flex-col gap-6 mt-16 p-4">
          <li>
            <a href="/" class="nav-link block py-2 text-gray-700 hover:text-teal-600 font-medium">Home</a>
          </li>
          <li>
            <a href="#" class="nav-link block py-2 text-gray-700 hover:text-teal-600 font-medium">Where is Telemetry?</a>
          </li>
          <li>
            <a href="#" class="nav-link block py-2 text-gray-700 hover:text-teal-600 font-medium">Español</a>
          </li>
        </ul>
      </div>

    </div>
  </nav>


  <main class="mainclass">
    <!-- <h1 class="page-title">Telemetry Dashboard</h1> -->

    <div class="controls">
      <div class="sensor-list" id="sensorList1" >

        <button class="sensor-button active" type="button" data-metric="temp-humidity">
          <span class="sensor-icon" style="display: flex; flex-direction: column; align-items: center; gap: 4px; width: 2em; height: 3.5em;">
            <!-- Thermometer -->
            <svg xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-thermometer"
                style="width: 100%; height: 50%;">
              <path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"></path>
            </svg>

            <!-- Droplets -->
            <svg xmlns="http://www.w3.org/2000/svg" 
              width="24" 
              height="24" 
              viewBox="0 0 24 24" 
              fill="none" 
              stroke="currentColor" 
              stroke-width="2" 
              stroke-linecap="round" 
              stroke-linejoin="round" 
              class="lucide lucide-droplets">
              <path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"></path>
              <path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"></path>
            </svg>
          </span>
        </button>


        <button class="sensor-button" type="button" data-metric="temperature">
          <span class="sensor-icon">
            <svg xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-thermometer">
              <path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"></path>
            </svg>
          </span>
          <span class="sensor-value">°C</span>
        </button>

        <button class="sensor-button" type="button" data-metric="humidity">
          <span class="sensor-icon">
            <svg xmlns="http://www.w3.org/2000/svg" 
              width="24" 
              height="24" 
              viewBox="0 0 24 24" 
              fill="none" 
              stroke="currentColor" 
              stroke-width="2" 
              stroke-linecap="round" 
              stroke-linejoin="round" 
              class="lucide lucide-droplets">
              <path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"></path>
              <path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"></path>
            </svg>
          </span>
          <span class="sensor-value">%</span>
        </button>

        

        <button class="sensor-button" type="button" data-metric="light">
          <span class="sensor-icon">
            <svg xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-sun-high">
              <circle cx="12" cy="12" r="5"></circle>
              <path d="M12 1v2"></path>
              <path d="M12 21v2"></path>
              <path d="M4.22 4.22l1.42 1.42"></path>
              <path d="M18.36 18.36l1.42 1.42"></path>
              <path d="M1 12h2"></path>
              <path d="M21 12h2"></path>
              <path d="M4.22 19.78l1.42-1.42"></path>
              <path d="M18.36 5.64l1.42-1.42"></path>
            </svg>
          </span>
          <span class="sensor-value">Lux</span>
        </button>
      
      
      <button class="load-button" type="button" data-metric="last24h" onclick="last24h()">
        <span class="sensor-icon">
          <svg xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-clock">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
        </span>
        <span class="sensor-value">24 hours</span>
      </button>

      <button class="load-button" type="button" data-metric="loadData" onclick="loadData()">
        <span class="sensor-icon">
          <svg xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-loader">
            <line x1="12" y1="2" x2="12" y2="6"></line>
            <line x1="12" y1="18" x2="12" y2="22"></line>
            <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line>
            <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
            <line x1="2" y1="12" x2="6" y2="12"></line>
            <line x1="18" y1="12" x2="22" y2="12"></line>
            <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line>
            <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>
          </svg>
        </span>
        <span class="sensor-value">Load</span>
      </button>
      </div>
      <!-- Tag + dates -->
      <div class="time-controls">
        <label class="control-field">
          <span class="control-label">Tag ID:</span>
          <select id="tagIdSelect" class="time-input"></select>
        </label>

        <label class="control-field">
          <span class="control-label">From:</span>
          <input id="fromInput" type="datetime-local" class="time-input">
        </label>

        <label class="control-field">
          <span class="control-label">To:</span>
          <input id="toInput" type="datetime-local" class="time-input">
        </label>
      </div>

    </div>

    <div id="loadingOverlay" class="loading-overlay hidden">
      <div class="spinner"></div>
      <div class="loading-text">Loading data…</div>
    </div>

    <section class="section-class" >
      <h2 id="chartTitle" class="text-xl font-semibold text-gray-800 mb-2"></h2>
      <div class="chart-container">
          <canvas id="mainChart"></canvas>
      </div>
    </section>
  </main>
  <footer class="footer_cp">
    <div class="content_cp">
      <h4>Powered by CP</h4>
      <h3>Copyright © 2026 CP</h3>
    </div>
  </footer>
</body>
</html>
