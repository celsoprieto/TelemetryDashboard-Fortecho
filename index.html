<body class="pt-8">

        <!-- Logo / Title -->

        </div>

        <!-- Desktop menu -->
        <ul class="hidden md:flex items-center gap-6 list-none p-0 m-0">
          <li>
            <a href="#" class="nav-link active text-sm leading-[14px] text-gray-700 hover:text-teal-600 font-medium" data-view="telemetry">Telemetry</a>
          </li>
          <li>
            <a href="#" class="nav-link text-sm leading-[14px] text-gray-700 hover:text-teal-600 font-medium" data-view="tags">Tags</a>
          </li>
          <li>
            <a href="#" class="nav-link text-sm leading-[14px] text-gray-700 hover:text-teal-600 font-medium" data-view="events">Device Events</a>

        <!-- Mobile button -->
        <button id="menuBtn"
          class="md:hidden inline-flex items-center justify-center p-2 rounded-md text-gray-700 hover:text-teal-600 hover:bg-gray-100 focus:outline-none"
          aria-label="Open menu">

          <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>

      </div>

      <!-- Mobile menu -->
      <!-- Mobile menu popup from right -->
      <div id="mobileMenu" class="fixed top-10 right-0 h-[calc(100vh-40px)] w-full bg-white shadow-lg transform translate-x-full transition-transform duration-300 ease-in-out z-50">
        <ul class="flex flex-col gap-6 mt-16 p-4">
          <li>
            <a href="#" class="nav-link block py-2 text-gray-700 hover:text-teal-600 font-medium" data-view="telemetry">Telemetry</a>
          </li>
          <li>
            <a href="#" class="nav-link block py-2 text-gray-700 hover:text-teal-600 font-medium" data-view="tags">Tags</a>
          </li>
          <li>
            <a href="#" class="nav-link block py-2 text-gray-700 hover:text-teal-600 font-medium" data-view="events">Device Events</a>

  <main class="mainclass">
    <!-- <h1 class="page-title">Telemetry Dashboard</h1> -->
  <!-- VIEW: TELEMETRY -->
  <section id="view-telemetry" class="view">
    <div class="controls">
      <div class="sensor-list" id="sensorList1" >

        <button class="sensor-button active" type="button" data-metric="temp-humidity">
          <span class="sensor-icon" style="display: flex; flex-direction: column; align-items: center; gap: 4px; width: 2em; height: 3.5em;">
            <!-- Thermometer -->
            <svg xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-thermometer"
                style="width: 100%; height: 50%;">
              <path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"></path>
            </svg>

            <!-- Droplets -->
            <svg xmlns="http://www.w3.org/2000/svg" 
              width="24" 
              height="24" 
              viewBox="0 0 24 24" 
              fill="none" 
              stroke="currentColor" 
              stroke-width="2" 
              stroke-linecap="round" 
              stroke-linejoin="round" 
              class="lucide lucide-droplets">
              <path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"></path>
              <path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"></path>
            </svg>
          </span>
        </button>


        <button class="sensor-button" type="button" data-metric="temperature">
          <span class="sensor-icon">
            <svg xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-thermometer">
              <path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"></path>
            </svg>
          </span>
          <span class="sensor-value">°C</span>
        </button>

        <button class="sensor-button" type="button" data-metric="humidity">
          <span class="sensor-icon">
            <svg xmlns="http://www.w3.org/2000/svg" 
              width="24" 
              height="24" 
              viewBox="0 0 24 24" 
              fill="none" 
              stroke="currentColor" 
              stroke-width="2" 
              stroke-linecap="round" 
              stroke-linejoin="round" 
              class="lucide lucide-droplets">
              <path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"></path>
              <path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"></path>
            </svg>
          </span>
          <span class="sensor-value">%</span>
        </button>

        

        <button class="sensor-button" type="button" data-metric="light">
          <span class="sensor-icon">
            <svg xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-sun-high">
              <circle cx="12" cy="12" r="5"></circle>
              <path d="M12 1v2"></path>
              <path d="M12 21v2"></path>
              <path d="M4.22 4.22l1.42 1.42"></path>
              <path d="M18.36 18.36l1.42 1.42"></path>
              <path d="M1 12h2"></path>
              <path d="M21 12h2"></path>
              <path d="M4.22 19.78l1.42-1.42"></path>
              <path d="M18.36 5.64l1.42-1.42"></path>
            </svg>
          </span>
          <span class="sensor-value">Lux</span>
        </button>

      </div>
      <div class="flex flex-col md:flex-row items-center md:items-end gap-2 w-full">
          <!-- Tag ID select -->
          <div class="flex flex-col items-center md:items-start min-w-[150px]">
            <label class="font-sans font-bold text-xs sm:text-sm leading-5 !text-[#157372] text-center md:text-left">
              Tag ID:
            </label>
            <select id="tagIdSelect" class="time-input w-full"></select>
          </div>
        <!-- Tag + dates -->
        <div class="time-controls flex flex-row flex-wrap items-end gap-2 flex-1 justify-center md:justify-start">
          <button class="range-button active" type="button" data-metric="last24h" onclick="last24h()">
            <span class="range-icon">
              <svg xmlns="http://www.w3.org/2000/svg" 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    stroke-width="2" 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    class="w-5 h-5">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
            </span>
            <span class="sensor-value">1 D</span>
          </button>

          <button class="range-button" type="button" data-metric="lastweek" onclick="lastweek()">
            <span class="range-icon">
              <svg xmlns="http://www.w3.org/2000/svg" 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    stroke-width="2" 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    class="w-5 h-5">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
            </span>
            <span class="sensor-value">1 W</span>
          </button>

          <button class="range-button" type="button" data-metric="lastmonth" onclick="lastmonth()">
            <span class="range-icon">
              <svg xmlns="http://www.w3.org/2000/svg" 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    stroke-width="2" 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    class="w-5 h-5">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
            </span>
            <span class="sensor-value">1 M</span>
          </button>
                  <button class="range-button" type="button" data-metric="last3months" onclick="last3months()">
            <span class="range-icon">
                <svg xmlns="http://www.w3.org/2000/svg" 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    stroke-width="2" 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    class="w-5 h-5">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
            </span>
            <span class="sensor-value">3 M</span>
          </button>



          <button class="range-button" type="button" data-metric="last6months" onclick="last6months()">
            <span class="range-icon">
              <svg xmlns="http://www.w3.org/2000/svg" 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    stroke-width="2" 
                    stroke-linecap="round" 
                    stroke-linejoin="round" 
                    class="w-5 h-5">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
            </span>
            <span class="sensor-value">6 M</span>
          </button>
    

          
          <div>
            <label class="control-field flex flex-col min-w-0 flex-1">
              <span class="control-label font-sans font-bold text-xs sm:text-sm leading-5 !text-[#157372]">From:</span>
              <input id="fromInput" type="datetime-local" class="time-input w-full min-w-0">
            </label>
          </div>
          <div>
            <label class="control-field flex flex-col min-w-0 flex-1">
              <span class="control-label font-sans font-bold text-xs sm:text-sm leading-5 !text-[#157372]">To:</span>
              <input id="toInput" type="datetime-local" class="time-input w-full min-w-0">
            </label>
          </div>

        </div>
      </div>

      <!-- Tag details div justo debajo -->
      <div class="artwork-controls flex flex-row gap-2 w-full items-center flex-nowrap" id="selectedTagdetails">
         <!-- Artist -->
         <div class="flex flex-row items-center gap-1">
          <span class="label-style text-xl font-semibold leading-5 mr-5px">Artist:</span>
          <span id="artistlabel" class="label-style-value value-black leading-5"></span>
        </div>

        <!-- Title -->
        <div class="flex flex-row items-center gap-1">
          <span class="label-style text-xl font-semibold leading-5 mr-5px">Title:</span>
          <span id="titlelabel" class="label-style-value value-black leading-5"></span>
        </div>
      </div>

      



   

    <section class="section-class" >
      <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
      <div class="loading-text">Loading data…</div>
      </div>
      <h2 id="chartTitle" class="text-xl font-semibold text-gray-800 mb-2"></h2>
      <div class="chart-container">
          <canvas id="mainChart"></canvas>
      </div>

      <!-- Options Div -->
      <div id="chartOptions" class="flex flex-row items-center justify-center space-x-4 p-2 border rounded bg-gray-50">
       
        <!-- Small divider / title -->
        <div class="px-2 text-custom-green font-semibold text-sm border-l border-r border-gray-300">
          External Weather          
        </div>
        <label class="inline-flex items-center">
          <input type="checkbox" class="form-checkbox h-4 w-4 text-blue-600" id="opTemp">
          <span class="ml-2 font-semibold text-xs text-custom-green">T</span>
        </label>
        <label class="inline-flex items-center">
              <input type="checkbox" class="form-checkbox h-4 w-4 text-blue-600" id="opHum">
              <span class="ml-2 font-semibold text-xs text-custom-green">rH</span>
        </label>
        
      </div>
    </section>



  </section>
   <!-- VIEW: EVENTS -->
  <section id="view-events" class="view hidden">
    <div class="w-full max-w-6xl mx-auto p-4">
      <div class="rounded-2xl border border-gray-200 bg-white shadow-sm">
        <!-- Header -->
        <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between p-4 border-b border-gray-200">
          <div>
            <h2 class="h2 text-lg font-bold">IoT Hub Events</h2>
            <!-- <p class="text-sm text-gray-500">Search, sort and paginate events</p> -->
          </div>
        </div>

        <!-- Table -->
        <div class="overflow-x-auto w-full">
          <table class="min-w-full w-full text-sm table-auto">
            <thead class="bg-gray-50 text-gray-600">
              <tr id="tableHead"></tr>
            </thead>
            <tbody id="tableBody" class="divide-y divide-gray-200"></tbody>
          </table>
        </div>

        <!-- Footer / Pagination -->
        <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between p-4 border-t border-gray-200">
          <div class="text-xs text-gray-600" id="rowsInfo"></div>

          <div class="flex items-center gap-2 flex-wrap">
            <button id="prevBtn"
              class="px-3 py-2 rounded-xl border border-gray-200 text-sm hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">
              Prev
            </button>

            <!-- Page buttons -->
            <div id="pageButtons" class="flex items-center gap-3 flex-wrap mx-2"></div>

            <button id="nextBtn"
              class="px-3 py-2 rounded-xl border border-gray-200 text-sm hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">
              Next
            </button>
          </div>
        </div>
      </div>
    </div>   
  </section>

  <section id="view-tags" class="view hidden">
    
    <!-- Header (top) -->
    <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between p-4 border-b border-gray-200">
      <div>
        <h2 class="text-lg font-bold">Tags</h2>
      </div>
    </div>

    <!-- Grid (below) -->
    <div class="p-4">
      <div id="tagsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

  </section>


  <!-- VIEW: ALARMS -->
  <section id="view-alarms" class="view hidden">
    <h2 class="text-xl font-semibold mb-4">Alarms</h2>
    <div id="alarmsContainer"></div>
  </section>
  </main>
  <footer class="footer_cp">
    <div class="content_cp">
      <h4>Powered by CP</h4>
      <h3>Copyright © 2026 CP</h3>
    </div>
  </footer>
</body>
</html>
